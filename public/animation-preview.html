<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Animation Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0600;
    color: #fff;
    font-family: 'Georgia', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 40px;
  }
  h1 { color: #f5c842; font-size: 1.2rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .btn-row { display: flex; gap: 20px; }
  button {
    padding: 16px 32px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.08em;
    border: 2px solid;
    transition: transform 0.1s;
  }
  button:active { transform: scale(0.96); }
  .btn-strung {
    background: rgba(255,220,50,0.15);
    border-color: #f5c842;
    color: #f5c842;
  }
  .btn-dragon {
    background: rgba(200,30,30,0.15);
    border-color: #cc3333;
    color: #ff6666;
  }

  /* Strungflowers shimmer */
  @keyframes strungShimmer {
    0%   { opacity: 0; }
    15%  { opacity: 1; }
    70%  { opacity: 0.7; }
    100% { opacity: 0; }
  }
  .strung-shimmer {
    position: fixed; inset: 0; z-index: 9400; pointer-events: none;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,220,50,0.3) 0%, rgba(255,180,0,0.12) 50%, transparent 80%);
    animation: strungShimmer 2s ease-out forwards;
  }

  /* Strungflowers particle */
  @keyframes strungParticle {
    0%   { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }
  }
  .strung-particle {
    position: fixed;
    pointer-events: none;
    z-index: 9500;
    font-size: var(--ps, 1.2rem);
    animation: strungParticle var(--pd, 1s) ease-out var(--pdelay, 0s) forwards;
  }

  /* Dragon particle */
  @keyframes dragonParticle {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
    60%  { opacity: 0.8; }
    100% { transform: translate(var(--px), var(--py)) scale(0.2) rotate(var(--pr, 180deg)); opacity: 0; }
  }
  .dragon-particle {
    position: fixed;
    pointer-events: none;
    z-index: 9500;
    font-size: var(--ps, 1.4rem);
    animation: dragonParticle var(--pd, 0.9s) ease-out var(--pdelay, 0s) forwards;
  }

  /* Screen shake */
  @keyframes screenShake {
    0%,100% { transform: translate(0,0); }
    10%  { transform: translate(-6px, 3px); }
    20%  { transform: translate(6px, -4px); }
    30%  { transform: translate(-4px, 5px); }
    40%  { transform: translate(5px, -3px); }
    50%  { transform: translate(-3px, 4px); }
    60%  { transform: translate(4px, -2px); }
    70%  { transform: translate(-2px, 3px); }
    80%  { transform: translate(3px, -1px); }
    90%  { transform: translate(-1px, 2px); }
  }
  .screen-shaking { animation: screenShake 0.5s ease-out; }

  /* Dragon smoke */
  @keyframes dragonSmoke {
    0%   { opacity: 0; transform: scale(0.8); }
    20%  { opacity: 0.7; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.3); }
  }
  .dragon-smoke {
    position: fixed; inset: 0; z-index: 9400; pointer-events: none;
    background: radial-gradient(ellipse at 50% 60%, rgba(180,20,0,0.4) 0%, rgba(80,0,0,0.25) 50%, transparent 75%);
    animation: dragonSmoke 1.2s ease-out forwards;
  }

  /* Flash overlays */
  @keyframes strungFlash {
    0%,100% { background: transparent; }
    15%     { background: rgba(255,220,50,0.35); }
    30%     { background: transparent; }
    45%     { background: rgba(255,220,50,0.25); }
  }
  @keyframes dragonFlash {
    0%,100% { background: transparent; }
    20%     { background: rgba(220,30,30,0.4); }
    40%     { background: transparent; }
    60%     { background: rgba(180,20,20,0.3); }
  }
  .flash-overlay { position: fixed; inset: 0; z-index: 99; pointer-events: none; }
  .flash-overlay.strung { animation: strungFlash 1.2s ease forwards; }
  .flash-overlay.dragon { animation: dragonFlash 1.0s ease forwards; }

  .label { font-size: 0.8rem; color: #888; text-align: center; margin-top: -10px; }
</style>
</head>
<body>
  <h1>🎲 Animation Preview</h1>
  <div class="btn-row">
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <button class="btn-strung" onclick="fireStrungflowers()">🌟 Strungflowers (4-5-6)</button>
      <div class="label">Golden shimmer + star burst + chime</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;align-items:center;">
      <button class="btn-dragon" onclick="fireDancingDragon()">🐉 Dancing Dragon (1-2-3)</button>
      <div class="label">Screen shake + fire burst + bass thud</div>
    </div>
  </div>

<script>
function fireStrungflowers() {
  const flash = document.createElement('div');
  flash.className = 'flash-overlay strung';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 1300);

  const shimmer = document.createElement('div');
  shimmer.className = 'strung-shimmer';
  document.body.appendChild(shimmer);
  setTimeout(() => shimmer.remove(), 2100);

  const symbols = ['⭐','🌟','✨','🪙','💫','💛','💠'];
  const cx = window.innerWidth / 2, cy = window.innerHeight * 0.45;
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'strung-particle';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    const angle = (Math.PI * 2 * i / 40) + (Math.random() - 0.5) * 0.4;
    const dist = 120 + Math.random() * 200;
    const px = Math.cos(angle) * dist;
    const py = Math.sin(angle) * dist - 80;
    const size = 0.9 + Math.random() * 1.2;
    const dur = 0.8 + Math.random() * 0.7;
    const delay = Math.random() * 0.3;
    el.style.cssText = `left:${cx}px;top:${cy}px;--px:${px}px;--py:${py}px;--ps:${size}rem;--pd:${dur}s;--pdelay:${delay}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 100);
  }

  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    [523, 659, 784, 1047, 1319].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t + i * 0.07);
      g.gain.setValueAtTime(0, t + i * 0.07);
      g.gain.linearRampToValueAtTime(0.12, t + i * 0.07 + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.5);
      osc.start(t + i * 0.07);
      osc.stop(t + i * 0.07 + 0.5);
    });
  } catch(e) {}
}

function fireDancingDragon() {
  const flash = document.createElement('div');
  flash.className = 'flash-overlay dragon';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 1100);

  document.body.classList.remove('screen-shaking');
  void document.body.offsetWidth;
  document.body.classList.add('screen-shaking');
  setTimeout(() => document.body.classList.remove('screen-shaking'), 550);

  const smoke = document.createElement('div');
  smoke.className = 'dragon-smoke';
  document.body.appendChild(smoke);
  setTimeout(() => smoke.remove(), 1300);

  const symbols = ['🔥','🐉','💨','💥','☠️','🔴','🖤'];
  const cx = window.innerWidth / 2, cy = window.innerHeight * 0.45;
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'dragon-particle';
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    const angle = (Math.PI * 2 * i / 30) + (Math.random() - 0.5) * 0.5;
    const dist = 80 + Math.random() * 180;
    const px = Math.cos(angle) * dist;
    const py = Math.sin(angle) * dist - 60;
    const size = 1.0 + Math.random() * 1.4;
    const dur = 0.6 + Math.random() * 0.5;
    const delay = Math.random() * 0.25;
    const rot = Math.round(Math.random() * 360 - 180);
    el.style.cssText = `left:${cx}px;top:${cy}px;--px:${px}px;--py:${py}px;--ps:${size}rem;--pd:${dur}s;--pdelay:${delay}s;--pr:${rot}deg;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay) * 1000 + 100);
  }

  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    const dist = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) curve[i] = (i / 128 - 1) * 8;
    dist.curve = curve;
    osc.connect(dist); dist.connect(g); g.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.6);
    g.gain.setValueAtTime(0.25, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    osc.start(t); osc.stop(t + 0.7);
  } catch(e) {}
}
</script>
</body>
</html>
