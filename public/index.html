<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEE-LO</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-dim: #a8882c;
    --paper: #f0e8d0;
    --red: #cc2200;
    --bg: #050302;
    --card: rgba(16, 10, 4, 0.92);
    --border: rgba(180, 120, 20, 0.22);
    --border-bright: rgba(245, 200, 66, 0.45);
    --text: #e8dcc8;
    --muted: #9a8a6a;
    --green: #4caf50;
    --ivory: #f5efd8;
  }

  body {
    font-family: 'Lato', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Layered lantern glow overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 900px 700px at -5% -5%, rgba(220,100,0,.12) 0%, transparent 65%),
      radial-gradient(ellipse 700px 600px at 105% -5%, rgba(200,80,0,.10) 0%, transparent 65%),
      radial-gradient(ellipse 500px 350px at 50% 0%, rgba(160,90,10,.06) 0%, transparent 60%),
      radial-gradient(ellipse 100% 40% at 50% 110%, rgba(0,0,0,.55) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Wood beam texture ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 58px,
      rgba(160, 100, 10, 0.018) 58px,
      rgba(160, 100, 10, 0.018) 60px,
      transparent 60px,
      transparent 118px,
      rgba(120, 70, 0, 0.012) 118px,
      rgba(120, 70, 0, 0.012) 120px
    );
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1;
    padding: 16px;
  }
  .screen.active { display: flex; }

  /* ═══════════════════════════════
     LOGIN SCREEN
  ═══════════════════════════════ */
  #screen-login { flex-direction: column; gap: 20px; }

  .login-lanterns {
    text-align: center;
    font-size: 2.2rem;
    letter-spacing: 0.3em;
    filter: drop-shadow(0 0 18px rgba(255, 140, 0, 0.55));
    animation: lanternSway 4s ease-in-out infinite;
  }

  @keyframes lanternSway {
    0%, 100% { filter: drop-shadow(0 0 16px rgba(255,140,0,0.5)); }
    50% { filter: drop-shadow(0 0 28px rgba(255,160,20,0.75)); }
  }

  .logo {
    font-family: 'Cinzel Decorative', serif;
    font-weight: 900;
    font-size: clamp(3.5rem, 11vw, 6.5rem);
    color: var(--gold);
    letter-spacing: 8px;
    text-shadow:
      0 0 30px rgba(245,200,66,0.7),
      0 0 70px rgba(245,160,0,0.3),
      0 4px 8px rgba(0,0,0,0.6);
    text-align: center;
    line-height: 1.1;
  }

  .logo-sub {
    text-align: center;
    color: var(--muted);
    font-family: 'Lato', sans-serif;
    font-style: italic;
    font-weight: 300;
    font-size: 0.9rem;
    letter-spacing: 0.25em;
    margin-top: -10px;
    opacity: 0.85;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 360px;
    backdrop-filter: blur(6px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(245,200,66,0.04);
  }

  /* ═══════════════════════════════
     INPUTS
  ═══════════════════════════════ */
  input[type="text"], input[type="number"] {
    background: rgba(10, 6, 2, 0.75);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--paper);
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    padding: 12px 16px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,200,66,0.12);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  /* ═══════════════════════════════
     BUTTONS
  ═══════════════════════════════ */
  .btn {
    background: linear-gradient(135deg, #f5c842 0%, #d4a010 50%, #c8940a 100%);
    color: #1a0e00;
    border: none;
    border-radius: 8px;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    box-shadow: 0 4px 16px rgba(200,148,10,0.35), 0 2px 4px rgba(0,0,0,0.4);
  }
  .btn:hover {
    background: linear-gradient(135deg, #ffd84a 0%, #e8b820 50%, #d4a010 100%);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(200,148,10,0.5), 0 2px 6px rgba(0,0,0,0.4);
  }
  .btn:active { transform: translateY(0); box-shadow: 0 2px 8px rgba(200,148,10,0.3); }
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  .btn-red {
    background: linear-gradient(135deg, #e03010, #aa1a00);
    color: #fff;
    box-shadow: 0 4px 14px rgba(200,30,0,0.4);
  }
  .btn-red:hover {
    background: linear-gradient(135deg, #f04020, #cc2200);
    box-shadow: 0 6px 20px rgba(200,30,0,0.55);
  }

  .btn-green {
    background: linear-gradient(135deg, #5dbf61, #3a9e3e);
    color: #fff;
    box-shadow: 0 4px 14px rgba(60,160,60,0.4);
  }
  .btn-green:hover {
    background: linear-gradient(135deg, #6dce72, #4caf50);
    box-shadow: 0 6px 20px rgba(60,160,60,0.55);
  }

  /* ═══════════════════════════════
     LOBBY
  ═══════════════════════════════ */
  #screen-lobby {
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    overflow-y: auto;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .lobby-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .lobby-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-shadow: 0 0 20px rgba(245,200,66,0.4);
  }

  .balance-display {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 20px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    backdrop-filter: blur(6px);
  }
  .balance-display span { color: var(--gold); font-weight: 700; font-size: 1.1rem; }

  .rooms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .room-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    flex-direction: column;
    gap: 8px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .room-card:hover {
    border-color: rgba(220,160,30,0.55);
    transform: translateY(-3px);
    box-shadow: 0 10px 32px rgba(200,148,10,0.2), 0 0 0 1px rgba(220,160,30,0.15);
  }

  .room-card-name {
    font-family: 'Cinzel', serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--gold);
  }
  .room-card-ante {
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 12px rgba(245,200,66,0.3);
  }
  .room-card-ante-label {
    font-family: 'Lato', sans-serif;
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: -6px;
  }
  .room-card-info {
    font-size: 0.9rem;
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }
  .room-card-players { color: var(--paper); font-family: 'Lato', sans-serif; }
  .room-card-pot { color: var(--gold); font-weight: 700; font-family: 'Lato', sans-serif; }
  .room-card-state {
    font-family: 'Lato', sans-serif;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.06);
    align-self: flex-start;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
  }
  .room-card-state.waiting { color: var(--green); background: rgba(76,175,80,0.12); }
  .room-card-state.active { color: var(--gold); background: rgba(245,200,66,0.1); }

  /* ═══════════════════════════════
     GAME SCREEN — ALLEY LAYOUT
  ═══════════════════════════════ */
  #screen-game {
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 0;
    gap: 0;
    overflow: hidden;
  }

  /* ── TOP: Alley scene (70vh) ── */
  .alley-section {
    position: relative;
    height: 70vh;
    flex-shrink: 0;
    overflow: hidden;
  }

  #alley-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Room info bar (thin dark strip at top) ── */
  .game-info-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 14px;
    background: rgba(4, 2, 1, 0.85);
    border-bottom: 1px solid rgba(180, 120, 20, 0.25);
    backdrop-filter: blur(8px);
    gap: 8px;
    flex-wrap: wrap;
    min-height: 36px;
  }

  .game-room-name {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
  }

  .game-info-stats {
    display: flex;
    gap: 12px;
    font-size: 0.75rem;
    font-family: 'Lato', sans-serif;
    color: var(--muted);
    flex-wrap: wrap;
    align-items: center;
  }
  .game-info-stats span { color: var(--paper); font-weight: 600; }
  .val-gold { color: var(--gold) !important; }

  .game-info-actions {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .chat-toggle-btn {
    background: rgba(20, 12, 4, 0.8);
    border: 1px solid rgba(180, 120, 20, 0.3);
    border-radius: 7px;
    color: var(--gold);
    font-size: 1rem;
    padding: 3px 9px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .chat-toggle-btn:hover {
    background: rgba(40, 25, 8, 0.9);
    border-color: var(--gold-dim);
  }

  .timer {
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--paper);
    font-variant-numeric: tabular-nums;
    min-width: 3ch;
  }
  .timer.urgent { color: var(--red); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* ── Spectator banner ── */
  .spectator-banner {
    position: absolute;
    top: 44px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: none;
    background: rgba(245,200,66,0.08);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 16px;
    text-align: center;
    font-family: 'Lato', sans-serif;
    font-size: 0.8rem;
    color: var(--gold);
    white-space: nowrap;
    backdrop-filter: blur(4px);
  }
  .spectator-banner.visible { display: block; }

  /* ── Dice zone (absolute over canvas, lower center) ── */
  .dice-zone {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .dice-container {
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: center;
    background: rgba(20, 14, 6, 0.5);
    padding: 14px 22px;
    border-radius: 14px;
    border: 1px solid rgba(160, 110, 30, 0.2);
    backdrop-filter: blur(4px);
    box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 8px 30px rgba(0,0,0,0.5);
  }

  /* ── Individual die ── */
  .die {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, #faf5e4, #f0e8d0);
    border: 2px solid rgba(180,140,60,0.35);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0;
    font-weight: 900;
    color: transparent;
    position: relative;
    transition: transform 0.12s, border-color 0.2s;
    box-shadow:
      inset 0 2px 5px rgba(255,255,255,0.7),
      inset 0 -3px 5px rgba(180,130,40,0.25),
      0 6px 18px rgba(0,0,0,0.55),
      0 2px 5px rgba(0,0,0,0.4),
      2px 4px 0 rgba(0,0,0,0.25);
    cursor: default;
    user-select: none;
  }

  .die-unknown {
    font-size: 1.3rem;
    font-family: 'Lato', sans-serif;
    color: rgba(100,80,40,0.55);
    pointer-events: none;
  }

  .pip {
    width: 11px;
    height: 11px;
    background: #1a0e00;
    border-radius: 50%;
    position: absolute;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 0 2px rgba(0,0,0,0.2);
    pointer-events: none;
  }

  .die.rolling {
    animation: tumble 0.18s linear infinite;
    border-color: rgba(245,200,66,0.7);
    box-shadow:
      inset 0 2px 5px rgba(255,255,255,0.6),
      0 6px 18px rgba(0,0,0,0.5),
      0 0 20px rgba(245,180,0,0.35);
  }

  .die.landed {
    animation: landBounce 0.45s ease-out forwards;
    border-color: rgba(245,200,66,0.6);
    box-shadow:
      inset 0 2px 5px rgba(255,255,255,0.7),
      0 6px 18px rgba(0,0,0,0.5),
      0 0 14px rgba(245,180,0,0.25);
  }

  @keyframes tumble {
    0%   { transform: rotate3d(1,  1, 0,   0deg) scale(0.97); }
    25%  { transform: rotate3d(1, -1, 0,  90deg) scale(1.02); }
    50%  { transform: rotate3d(-1, 1, 0, 180deg) scale(0.97); }
    75%  { transform: rotate3d(1,  1, 1, 270deg) scale(1.02); }
    100% { transform: rotate3d(1,  1, 0, 360deg) scale(0.97); }
  }

  @keyframes landBounce {
    0%   { transform: scale(1.18); }
    35%  { transform: scale(0.91); }
    65%  { transform: scale(1.07); }
    85%  { transform: scale(0.97); }
    100% { transform: scale(1.00); }
  }

  /* Legacy pip die (kept for compatibility) */
  .die-pips {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, #faf5e4, #f0e8d0);
    border: 2px solid rgba(180,140,60,0.35);
    border-radius: 10px;
    display: grid;
    padding: 8px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.4);
    position: relative;
  }
  .die-pips.rolling { animation: tumble 0.18s linear infinite; border-color: var(--gold); }
  .die-pips.landed  { animation: landBounce 0.45s ease-out forwards; border-color: var(--gold); }

  .result-label {
    font-family: 'Cinzel', serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    min-height: 1.6rem;
    letter-spacing: 0.06em;
    text-shadow: 0 0 24px rgba(245,200,66,0.6), 0 0 50px rgba(245,200,66,0.25), 0 2px 4px rgba(0,0,0,0.6);
  }

  /* ── Roll button (floats at bottom of alley) ── */
  .roll-btn-wrapper {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
  }

  #btn-roll {
    font-size: 1.05rem;
    padding: 13px 46px;
    border-radius: 12px;
    letter-spacing: 0.1em;
    box-shadow: 0 0 30px rgba(200,148,10,0.35), 0 6px 20px rgba(0,0,0,0.55);
    white-space: nowrap;
  }

  /* ── Re-ante overlay (center of alley) ── */
  .reante-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.58);
    backdrop-filter: blur(3px);
  }
  .reante-overlay.visible {
    display: flex;
  }

  /* Inner card inside overlay */
  .reante-card {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: center;
    background: rgba(10, 6, 2, 0.94);
    border: 1px solid rgba(245,200,66,0.4);
    border-radius: 16px;
    padding: 30px 40px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(245,200,66,0.1);
  }

  .reante-label {
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1rem;
    text-align: center;
    letter-spacing: 0.06em;
  }

  .reante-btn-row {
    display: flex;
    gap: 12px;
  }

  /* ── Shootout banner ── */
  .shootout-banner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 25;
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,200,66,0.8), 0 0 60px rgba(245,200,66,0.4);
    letter-spacing: 0.22em;
    background: rgba(4, 2, 1, 0.88);
    padding: 14px 36px;
    border: 2px solid var(--gold);
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(245,200,66,0.3);
    white-space: nowrap;
    animation: shootoutPulse 1.1s ease-in-out infinite;
  }

  @keyframes shootoutPulse {
    0%, 100% { box-shadow: 0 0 40px rgba(245,200,66,0.3); }
    50% { box-shadow: 0 0 65px rgba(245,200,66,0.6), 0 0 100px rgba(245,200,66,0.2); }
  }

  /* ═══════════════════════════════
     BOTTOM: PLAYER HUD (30vh)
  ═══════════════════════════════ */
  .player-hud {
    height: 30vh;
    min-height: 120px;
    background: rgba(5, 2, 0, 0.97);
    border-top: 1px solid rgba(180, 120, 20, 0.35);
    display: flex;
    align-items: stretch;
    padding: 8px;
    flex-shrink: 0;
    overflow: hidden;
  }

  /* 5-slot flex row */
  .hud-slots {
    display: flex;
    flex: 1;
    gap: 6px;
    align-items: stretch;
  }

  .hud-slot {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(180, 120, 20, 0.14);
    border-radius: 10px;
    padding: 8px 4px;
    transition: all 0.25s;
    min-width: 0;
    overflow: hidden;
  }

  .hud-slot.active-turn {
    border-color: var(--gold);
    background: rgba(245,200,66,0.07);
    box-shadow: 0 0 18px rgba(245,200,66,0.18), inset 0 0 18px rgba(245,200,66,0.04);
  }

  .hud-slot.is-me {
    border-color: rgba(245,200,66,0.28);
    background: rgba(245,200,66,0.04);
  }

  .hud-slot.is-winner {
    border-color: var(--green);
    background: rgba(76,175,80,0.07);
    box-shadow: 0 0 18px rgba(76,175,80,0.2);
  }

  .hud-slot.done { opacity: 0.65; }

  .hud-slot-empty {
    color: rgba(120, 90, 40, 0.3);
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .hud-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(200,148,10,0.4), rgba(40,25,0,0.85));
    border: 2px solid rgba(180,120,20,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--gold);
    flex-shrink: 0;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .hud-slot.active-turn .hud-avatar {
    border-color: var(--gold);
    box-shadow: 0 0 12px rgba(245,200,66,0.5);
  }

  .hud-name {
    font-family: 'Lato', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    color: var(--paper);
    text-align: center;
    width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 4px;
  }

  .you-tag {
    font-size: 0.58rem;
    color: var(--gold);
    background: rgba(245,200,66,0.15);
    padding: 1px 5px;
    border-radius: 8px;
    margin-left: 4px;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.04em;
  }

  .hud-balance {
    font-family: 'Lato', sans-serif;
    font-size: 0.68rem;
    color: var(--muted);
    text-align: center;
  }

  .hud-result {
    font-family: 'Lato', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--paper);
    text-align: center;
    min-height: 1em;
    padding: 0 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }

  .hud-status {
    font-family: 'Lato', sans-serif;
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 7px;
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .hud-status.done    { background: rgba(76,175,80,0.14);   color: var(--green); }
  .hud-status.rolling { background: rgba(245,200,66,0.14);  color: var(--gold); }

  /* ═══════════════════════════════
     CHAT PANEL (slide-in from right)
  ═══════════════════════════════ */
  .chat-panel {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 300px;
    z-index: 50;
    background: rgba(6, 3, 1, 0.97);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -8px 0 40px rgba(0,0,0,0.5);
  }
  .chat-panel.open { transform: translateX(0); }

  .chat-header {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    font-family: 'Cinzel', serif;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(180,120,20,0.25); border-radius: 2px; }

  .chat-msg {
    font-family: 'Lato', sans-serif;
    font-size: 0.8rem;
    line-height: 1.45;
    padding: 6px 10px;
    border-radius: 8px;
    word-break: break-word;
  }
  .chat-msg.system {
    color: rgba(155,130,80,0.75);
    font-style: italic;
    background: rgba(255,255,255,0.02);
    font-size: 0.74rem;
  }
  .chat-msg.player {
    color: var(--paper);
    background: rgba(255,255,255,0.04);
    border-left: 2px solid rgba(180,120,20,0.3);
  }
  .chat-msg .msg-name { color: var(--gold); font-weight: 700; margin-right: 4px; }

  .chat-input-area {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    background: rgba(4, 2, 1, 0.6);
    flex-shrink: 0;
  }
  .chat-input-area input { flex: 1; padding: 8px 12px; font-size: 0.85rem; }
  .chat-input-area .btn  { padding: 8px 14px; font-size: 0.8rem; }

  /* ── Round history (hidden but present for JS) ── */
  .round-history {
    position: absolute;
    bottom: 0; left: -9999px;
    visibility: hidden;
    pointer-events: none;
    overflow: hidden;
  }
  .round-history-title {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 5px;
    color: rgba(155,130,80,0.7);
  }

  /* ═══════════════════════════════
     WINNER OVERLAY
  ═══════════════════════════════ */
  #screen-winner {
    background: rgba(5,3,2,0.94);
    flex-direction: column;
    gap: 24px;
    z-index: 100;
  }

  .winner-card {
    background: var(--card);
    border: 1px solid rgba(245,200,66,0.5);
    border-radius: 16px;
    padding: 32px 40px;
    max-width: 480px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 80px rgba(245,200,66,0.2), 0 20px 60px rgba(0,0,0,0.7);
  }

  .winner-crown { font-size: 3rem; }
  .winner-title {
    font-family: 'Cinzel', serif;
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
  }
  .winner-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 1.9rem;
    font-weight: 900;
    color: var(--gold);
    text-align: center;
    text-shadow: 0 0 30px rgba(245,200,66,0.5);
  }
  .winner-result { font-family: 'Lato', sans-serif; font-size: 1.1rem; color: var(--paper); }
  .winner-pot { font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 700; color: var(--gold); }
  .winner-rake { font-family: 'Lato', sans-serif; font-size: 0.8rem; color: var(--muted); }

  .winner-rankings { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .rank-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
  }
  .rank-num  { color: var(--muted); width: 20px; font-weight: 700; }
  .rank-name { flex: 1; color: var(--paper); }
  .rank-result { color: var(--gold); font-weight: 600; }

  /* ═══════════════════════════════
     ERROR TOAST
  ═══════════════════════════════ */
  #error-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, #e03010, #aa1a00);
    color: white;
    padding: 10px 22px;
    border-radius: 8px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    z-index: 200;
    transition: transform 0.3s;
    pointer-events: none;
    box-shadow: 0 4px 20px rgba(200,30,0,0.5);
  }
  #error-toast.show { transform: translateX(-50%) translateY(0); }

  /* ═══════════════════════════════
     RESPONSIVE
  ═══════════════════════════════ */
  @media (max-width: 768px) {
    .chat-panel { width: 280px; }
    .die { width: 60px; height: 60px; }
    .hud-name { font-size: 0.68rem; }
    .hud-avatar { width: 28px; height: 28px; font-size: 0.75rem; }
    #btn-roll { padding: 11px 30px; font-size: 0.9rem; }
    .rooms-grid { grid-template-columns: 1fr 1fr; }
    .winner-card { padding: 24px 20px; }
    #screen-lobby { padding: 0 12px; }
  }

  @media (max-width: 480px) {
    .rooms-grid { grid-template-columns: 1fr; }
    .logo { font-size: 3rem; }
    .hud-slots { gap: 3px; }
    .hud-slot { padding: 5px 2px; }
    .hud-avatar { width: 24px; height: 24px; font-size: 0.65rem; border-width: 1px; }
    .hud-balance { display: none; }
    .alley-section { height: 65vh; }
    .player-hud { height: 35vh; }
  }
</style>
</head>
<body>

<!-- ERROR TOAST -->
<div id="error-toast"></div>

<!-- ===== SCREEN 1: LOGIN ===== -->
<div id="screen-login" class="screen active">
  <div class="login-lanterns">🏮 🏮</div>
  <div class="logo">CEE-LO</div>
  <div class="logo-sub">骰子 · Street Dice</div>
  <div class="login-card">
    <input type="text" id="input-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
    <button class="btn" id="btn-enter-lobby">Enter Lobby</button>
  </div>
</div>

<!-- ===== SCREEN 2: LOBBY ===== -->
<div id="screen-lobby" class="screen">
  <div class="lobby-header">
    <div class="lobby-title">🎲 CEE-LO</div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <div class="balance-display">Balance: $<span id="lobby-balance">—</span></div>
      <div id="lobby-player-name" style="color:var(--muted);font-size:0.85rem;font-family:'Lato',sans-serif;"></div>
    </div>
  </div>
  <div class="rooms-grid" id="rooms-grid"></div>
</div>

<!-- ===== SCREEN 3: GAME ===== -->
<div id="screen-game" class="screen">

  <!-- TOP SECTION (70vh): Alley Scene -->
  <div class="alley-section">

    <!-- Full-width background canvas -->
    <canvas id="alley-canvas"></canvas>

    <!-- Room info bar (thin dark strip at top) -->
    <div class="game-info-bar">
      <div class="game-room-name" id="game-room-name">—</div>
      <div class="game-info-stats">
        <span>Round <span id="game-round">—</span></span>
        <span>Pot <span class="val-gold" id="game-pot">$0</span></span>
        <span>Ante <span id="game-ante">—</span></span>
        <span>⏱ <span id="game-timer" class="timer">—</span></span>
      </div>
      <div class="game-info-actions">
        <button class="chat-toggle-btn" id="btn-chat-toggle" title="Open chat">💬</button>
        <button class="btn-outline" id="btn-leave" style="padding:4px 12px;font-size:0.78rem;">Leave</button>
      </div>
    </div>

    <!-- Spectator notice -->
    <div class="spectator-banner" id="spectator-banner">👁 Spectating — you are not in this round</div>

    <!-- Dice landing zone (positioned over canvas, lower center) -->
    <div class="dice-zone">
      <div class="dice-container" id="dice-container">
        <div class="die" id="die-0">?</div>
        <div class="die" id="die-1">?</div>
        <div class="die" id="die-2">?</div>
      </div>
      <div class="result-label" id="result-label"></div>
    </div>

    <!-- Roll button floating at bottom -->
    <div class="roll-btn-wrapper">
      <button class="btn" id="btn-roll" disabled>🎲 THROW DICE</button>
    </div>

    <!-- Re-ante overlay (center of alley) -->
    <!-- NOTE: id="reante-buttons" kept so existing JS toggle logic works -->
    <div class="reante-overlay" id="reante-buttons">
      <div class="reante-card">
        <div class="reante-label" id="reante-label">Re-Ante offered!</div>
        <div class="reante-btn-row">
          <button class="btn btn-green" id="btn-reante-yes">✓ Yes, Re-Ante</button>
          <button class="btn btn-red"   id="btn-reante-no">✗ No Thanks</button>
        </div>
      </div>
    </div>

    <!-- Shootout banner -->
    <div class="shootout-banner" id="shootout-banner" style="display:none;">⚔ SHOOTOUT ⚔</div>

  </div><!-- /alley-section -->

  <!-- BOTTOM SECTION (30vh): Player HUD -->
  <div class="player-hud">
    <div id="players-list" class="hud-slots"></div>
  </div>

  <!-- Round history (hidden, kept for JS state) -->
  <div class="round-history" id="round-history">
    <div class="round-history-title">Recent Rounds</div>
    <div id="round-history-content"></div>
  </div>

</div><!-- /screen-game -->

<!-- Chat panel (slide-in from right, overlays alley) -->
<div class="chat-panel" id="chat-panel">
  <div class="chat-header">
    <span>💬 Chat</span>
    <button class="btn-outline" id="btn-chat-close" style="padding:3px 10px;font-size:0.72rem;">✕</button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-area">
    <input type="text" id="chat-input" placeholder="Say something..." maxlength="200">
    <button class="btn" id="btn-chat-send">→</button>
  </div>
</div>

<!-- ===== SCREEN 4: WINNER OVERLAY ===== -->
<div id="screen-winner" class="screen">
  <div class="winner-card">
    <div class="winner-crown">🏆</div>
    <div class="winner-title">Round Winner</div>
    <div class="winner-name" id="winner-name">—</div>
    <div class="winner-result" id="winner-result"></div>
    <div class="winner-pot" id="winner-pot"></div>
    <div class="winner-rake" id="winner-rake"></div>
    <div class="winner-rankings" id="winner-rankings"></div>
    <button class="btn" id="btn-winner-close" style="margin-top:8px;">Continue →</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  'use strict';

  // ===== STATE =====
  let myId = null;
  let myName = '';
  let myBalance = 1000;
  let currentRoom = null;
  let roomState = null;
  let isSpectator = false;
  let timerInterval = null;
  let animating = false;
  let winnerDismissTimer = null;
  let alleyStarted = false;

  // ===== SOCKET =====
  const socket = io();

  socket.on('connect', () => {
    myId = socket.id;
    console.log('Connected:', myId);
  });

  socket.on('disconnect', () => {
    showError('Disconnected from server');
  });

  socket.on('error', ({ message }) => {
    showError(message);
  });

  socket.on('lobby_state', (data) => {
    renderLobby(data.rooms);
  });

  socket.on('room_state', (state) => {
    roomState = state;
    currentRoom = state;
    renderGameState(state);
    showScreen('game');
  });

  socket.on('roll_result', ({ playerId, dice, evaluation, rollCount, done }) => {
    if (playerId === myId) {
      animateDice(dice, evaluation);
    } else {
      updatePlayerResult(playerId, dice, evaluation, done);
    }
  });

  socket.on('re_ante_offer', ({ playerId, timerEnd }) => {
    if (playerId === myId) {
      showReAnteOffer();
      startTimer(timerEnd);
    }
  });

  socket.on('shootout_start', ({ playerIds, round, timerEnd }) => {
    addChatMessage({ type: 'system', text: `🔫 Shootout Round ${round}! Players: ${playerIds.length}` });
    startTimer(timerEnd);
    // Show shootout banner briefly
    const banner = document.getElementById('shootout-banner');
    if (banner) {
      banner.style.display = 'block';
      setTimeout(() => { banner.style.display = 'none'; }, 3500);
    }
  });

  socket.on('round_end', ({ winner, pot, rake, isTie }) => {
    showWinner(winner, pot, rake, isTie);
  });

  socket.on('chat_message', (msg) => {
    addChatMessage(msg);
  });

  // ===== SCREENS =====
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active');
      s.style.display = 'none';
    });
    const el = document.getElementById('screen-' + name);
    if (el) {
      el.style.display = 'flex';
      el.classList.add('active');
    }
    // Start alley canvas when game screen first shown
    if (name === 'game' && !alleyStarted) {
      alleyStarted = true;
      setTimeout(() => {
        if (typeof resizeAlley === 'function') {
          resizeAlley();
          drawAlley();
        }
      }, 60);
    }
  }

  // Initially set all screens to none except login
  document.querySelectorAll('.screen').forEach(s => {
    if (!s.classList.contains('active')) s.style.display = 'none';
  });

  // ===== LOGIN =====
  const btnEnterLobby = document.getElementById('btn-enter-lobby');
  const inputName = document.getElementById('input-name');

  btnEnterLobby.addEventListener('click', enterLobby);
  inputName.addEventListener('keydown', (e) => { if (e.key === 'Enter') enterLobby(); });

  function enterLobby() {
    const name = inputName.value.trim();
    if (!name) { showError('Please enter your name'); return; }
    myName = name;
    document.getElementById('lobby-player-name').textContent = name;
    showScreen('lobby');
    socket.emit('get_lobby');
  }

  // ===== LOBBY =====
  function renderLobby(rooms) {
    const grid = document.getElementById('rooms-grid');
    grid.innerHTML = '';
    if (!rooms || !rooms.length) {
      grid.innerHTML = '<div style="color:var(--muted);padding:20px;font-family:\'Lato\',sans-serif;">No rooms available</div>';
      return;
    }
    rooms.forEach(room => {
      const card = document.createElement('div');
      card.className = 'room-card';
      const stateClass = room.state === 'waiting' ? 'waiting' : 'active';
      const stateLabel = room.state === 'waiting' ? 'Waiting' : 'In Progress';
      card.innerHTML = `
        <div class="room-card-name">${escHtml(room.name)}</div>
        <div class="room-card-ante">$${room.ante}</div>
        <div class="room-card-ante-label">Ante per round</div>
        <div class="room-card-info">
          <span class="room-card-players">👥 ${room.playerCount}/${room.maxPlayers}</span>
          <span class="room-card-pot">$${room.pot || 0}</span>
        </div>
        <span class="room-card-state ${stateClass}">${stateLabel}</span>
        ${room.spectatorCount > 0 ? `<div style="font-size:0.75rem;color:var(--muted);font-family:'Lato',sans-serif;">👁 ${room.spectatorCount} watching</div>` : ''}
      `;
      card.addEventListener('click', () => joinRoom(room.id));
      grid.appendChild(card);
    });
  }

  function joinRoom(roomId) {
    isSpectator = false;
    socket.emit('join_room', { name: myName, roomId });
    clearChat();
  }

  // ===== GAME =====
  function renderGameState(state) {
    // Header info bar
    document.getElementById('game-room-name').textContent = state.name || 'Room';
    document.getElementById('game-round').textContent = state.round || 1;
    document.getElementById('game-ante').textContent = '$' + (state.ante || 0);
    document.getElementById('game-pot').textContent = '$' + (state.pot || 0);

    // Determine if we're a player
    const me = state.players ? state.players.find(p => p.id === myId) : null;
    isSpectator = !me;

    document.getElementById('spectator-banner').classList.toggle('visible', isSpectator);

    // Update my balance in lobby header too
    if (me) {
      myBalance = me.balance;
      document.getElementById('lobby-balance').textContent = me.balance;
    }

    // Dice — show my current roll if any
    if (me && me.rolls && me.rolls.length === 3 && !animating) {
      displayDice(me.rolls);
      if (me.result) {
        document.getElementById('result-label').textContent = (me.result.emoji || '') + ' ' + (me.result.label || '');
      }
    }

    // Roll button state
    updateRollButton(state, me);

    // Players HUD
    renderPlayers(state);

    // Timer
    if (state.timerEnd && state.timerEnd > Date.now()) {
      startTimer(state.timerEnd);
    }

    // Round history (kept for JS state, hidden visually)
    if (state.roundHistory && state.roundHistory.length > 0) {
      const hist = document.getElementById('round-history');
      const content = document.getElementById('round-history-content');
      content.textContent = state.roundHistory.slice(-3).map(r =>
        `Round ${r.round}: ${r.winner || 'Tie'} won $${r.pot || 0}`
      ).join(' · ');
    }
  }

  function updateRollButton(state, me) {
    const btn = document.getElementById('btn-roll');
    if (!me || isSpectator) {
      btn.disabled = true;
      btn.textContent = isSpectator ? '👁 Spectating' : '⏳ Waiting...';
      return;
    }

    const isMyTurn = state.players && state.currentTurnIndex !== undefined
      && state.players[state.currentTurnIndex]
      && state.players[state.currentTurnIndex].id === myId;

    if (me.done) {
      btn.disabled = true;
      btn.textContent = '✓ Done';
    } else if (me.reAnteActive) {
      btn.disabled = true;
      btn.textContent = '⏳ Re-Ante Pending';
    } else if (!isMyTurn) {
      btn.disabled = true;
      btn.textContent = '⏳ Wait...';
    } else if (animating) {
      btn.disabled = true;
      btn.textContent = '🎲 Rolling...';
    } else {
      btn.disabled = false;
      btn.textContent = me.rollCount > 0 ? '🎲 Roll Again' : '🎲 THROW DICE';
    }
  }

  // ── Player HUD — 5 fixed slots ──
  function renderPlayers(state) {
    const list = document.getElementById('players-list');
    list.innerHTML = '';
    const MAX_SLOTS = 5;

    for (let idx = 0; idx < MAX_SLOTS; idx++) {
      const player = state.players && state.players[idx] ? state.players[idx] : null;
      const slot = document.createElement('div');
      slot.className = 'hud-slot';

      if (!player) {
        slot.innerHTML = '<div class="hud-slot-empty">EMPTY</div>';
      } else {
        if (player.id === myId) slot.classList.add('is-me');
        if (state.currentTurnIndex === idx && !player.done) slot.classList.add('active-turn');
        if (player.done) slot.classList.add('done');

        const initial = (player.name || '?')[0].toUpperCase();
        const resultText = player.result
          ? (player.result.emoji || '') + ' ' + (player.result.label || '')
          : (player.rollCount > 0 ? '...' : '—');
        const statusText = player.done ? 'done' : (state.currentTurnIndex === idx ? 'rolling' : 'waiting');
        const statusClass = player.done ? 'done' : (state.currentTurnIndex === idx ? 'rolling' : '');
        const youTag = player.id === myId ? '<span class="you-tag">YOU</span>' : '';

        slot.innerHTML = `
          <div class="hud-avatar">${escHtml(initial)}</div>
          <div class="hud-name">${escHtml(player.name)}${youTag}</div>
          <div class="hud-balance">金${(player.balance || 0).toLocaleString()}</div>
          <div class="hud-result">${escHtml(resultText)}</div>
          <div class="hud-status ${statusClass}">${statusText}</div>
        `;
      }
      list.appendChild(slot);
    }
  }

  function updatePlayerResult(playerId, dice, evaluation, done) {
    // Will be updated via next room_state; no immediate action needed
  }

  // ===== DICE =====
  function displayDice(values) {
    for (let i = 0; i < 3; i++) {
      const die = document.getElementById('die-' + i);
      if (die && values[i] !== undefined) {
        die.textContent = values[i] || '?';
      }
    }
  }

  function animateDice(finalValues, evaluation) {
    animating = true;
    const dies = [0,1,2].map(i => document.getElementById('die-' + i));
    dies.forEach(d => { d.classList.add('rolling'); d.classList.remove('landed'); });

    const duration = 700;

    const interval = setInterval(() => {
      dies.forEach(d => { d.textContent = Math.ceil(Math.random() * 6); });
    }, 60);

    setTimeout(() => {
      clearInterval(interval);
      dies.forEach((d, i) => {
        d.textContent = finalValues[i];
        d.classList.remove('rolling');
        d.classList.add('landed');
      });
      if (evaluation) {
        document.getElementById('result-label').textContent =
          (evaluation.emoji || '') + ' ' + (evaluation.label || '');
      }
      animating = false;

      setTimeout(() => {
        if (roomState) {
          const me = roomState.players ? roomState.players.find(p => p.id === myId) : null;
          updateRollButton(roomState, me);
        }
      }, 200);
    }, duration);
  }

  // ===== TIMER =====
  function startTimer(timerEnd) {
    if (timerInterval) clearInterval(timerInterval);
    const el = document.getElementById('game-timer');

    function tick() {
      const remaining = Math.max(0, Math.ceil((timerEnd - Date.now()) / 1000));
      el.textContent = remaining + 's';
      el.classList.toggle('urgent', remaining <= 5);
      if (remaining <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }
    tick();
    timerInterval = setInterval(tick, 500);
  }

  // ===== RE-ANTE =====
  // id="reante-buttons" is on the overlay div; .visible shows/hides it
  function showReAnteOffer() {
    document.getElementById('reante-buttons').classList.add('visible');
  }
  function hideReAnteOffer() {
    document.getElementById('reante-buttons').classList.remove('visible');
  }

  document.getElementById('btn-reante-yes').addEventListener('click', () => {
    socket.emit('re_ante_accept');
    hideReAnteOffer();
  });
  document.getElementById('btn-reante-no').addEventListener('click', () => {
    socket.emit('re_ante_decline');
    hideReAnteOffer();
  });

  // ===== WINNER =====
  function showWinner(winnerId, pot, rake, isTie) {
    if (!roomState) return;

    const winnerPlayer = roomState.players
      ? roomState.players.find(p => p.id === winnerId)
      : null;

    const winnerName = isTie ? 'TIE!' : (winnerPlayer ? winnerPlayer.name : 'Unknown');
    const winnerResult = winnerPlayer && winnerPlayer.result
      ? (winnerPlayer.result.emoji || '') + ' ' + (winnerPlayer.result.label || '')
      : '';

    document.getElementById('winner-name').textContent = winnerName;
    document.getElementById('winner-result').textContent = winnerResult;
    document.getElementById('winner-pot').textContent = isTie ? 'Pot Carries Over' : ('Won $' + pot);
    document.getElementById('winner-rake').textContent = rake ? `House rake: $${rake}` : '';

    // Rankings
    const rankings = document.getElementById('winner-rankings');
    rankings.innerHTML = '';
    if (roomState.players) {
      const sorted = [...roomState.players]
        .filter(p => p.result)
        .sort((a, b) => (b.result.score || 0) - (a.result.score || 0));

      sorted.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'rank-row';
        row.innerHTML = `
          <div class="rank-num">#${i+1}</div>
          <div class="rank-name">${escHtml(p.name)}${p.id === myId ? ' (you)' : ''}</div>
          <div class="rank-result">${p.result ? (p.result.emoji || '') + ' ' + (p.result.label || '') : '—'}</div>
        `;
        rankings.appendChild(row);
      });
    }

    showScreen('winner');

    if (winnerDismissTimer) clearTimeout(winnerDismissTimer);
    winnerDismissTimer = setTimeout(() => { dismissWinner(); }, 6000);
  }

  function dismissWinner() {
    if (winnerDismissTimer) { clearTimeout(winnerDismissTimer); winnerDismissTimer = null; }
    showScreen('game');
    [0,1,2].forEach(i => {
      const d = document.getElementById('die-' + i);
      d.textContent = '?';
      d.classList.remove('rolling','landed');
    });
    document.getElementById('result-label').textContent = '';
    const btn = document.getElementById('btn-roll');
    if (btn.textContent.includes('Done') || btn.textContent === '✓ Done') {
      btn.textContent = '🎲 THROW DICE';
      btn.disabled = true;
    }
  }

  document.getElementById('btn-winner-close').addEventListener('click', dismissWinner);

  // ===== ROLL =====
  document.getElementById('btn-roll').addEventListener('click', () => {
    if (animating) return;
    socket.emit('roll_dice');
  });

  // ===== LEAVE =====
  document.getElementById('btn-leave').addEventListener('click', () => {
    socket.emit('leave_room');
    currentRoom = null;
    roomState = null;
    isSpectator = false;
    [0,1,2].forEach(i => {
      const d = document.getElementById('die-'+i);
      d.textContent = '?'; d.classList.remove('rolling','landed');
    });
    document.getElementById('result-label').textContent = '';
    hideReAnteOffer();
    clearChat();
    closeChatPanel();
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.getElementById('game-timer').textContent = '—';
    showScreen('lobby');
    socket.emit('get_lobby');
  });

  // ===== CHAT PANEL TOGGLE =====
  function openChatPanel() {
    document.getElementById('chat-panel').classList.add('open');
  }
  function closeChatPanel() {
    document.getElementById('chat-panel').classList.remove('open');
  }

  document.getElementById('btn-chat-toggle').addEventListener('click', openChatPanel);
  document.getElementById('btn-chat-close').addEventListener('click', closeChatPanel);

  // ===== CHAT =====
  function clearChat() {
    document.getElementById('chat-messages').innerHTML = '';
  }

  function addChatMessage(msg) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (msg.type || 'system');

    if (msg.type === 'player') {
      div.innerHTML = `<span class="msg-name">${escHtml(msg.name || '?')}:</span>${escHtml(msg.text || '')}`;
    } else {
      div.textContent = msg.text || '';
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  const chatInput = document.getElementById('chat-input');
  const btnChatSend = document.getElementById('btn-chat-send');

  function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    socket.emit('send_chat', { text });
    chatInput.value = '';
  }

  btnChatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

  // ===== ERROR TOAST =====
  let errorTimer = null;
  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.classList.add('show');
    if (errorTimer) clearTimeout(errorTimer);
    errorTimer = setTimeout(() => { toast.classList.remove('show'); }, 3500);
  }

  // ===== UTILS =====
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ===== AUTO-REFRESH LOBBY =====
  setInterval(() => {
    const lobby = document.getElementById('screen-lobby');
    if (lobby.classList.contains('active')) {
      socket.emit('get_lobby');
    }
  }, 5000);

})();
</script>

<!-- ═══════════════════════════════════════════════════
     VISUAL: Pip-based dice face renderer
     Pure visual layer — no game logic, no socket events
═══════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  var PIP_LAYOUTS = {
    1: [[50, 50]],
    2: [[72, 28], [28, 72]],
    3: [[72, 28], [50, 50], [28, 72]],
    4: [[28, 28], [72, 28], [28, 72], [72, 72]],
    5: [[28, 28], [72, 28], [50, 50], [28, 72], [72, 72]],
    6: [[28, 22], [72, 22], [28, 50], [72, 50], [28, 78], [72, 78]]
  };

  function buildPips(value) {
    var v = parseInt(value, 10);
    if (!v || v < 1 || v > 6) {
      return '<span class="die-unknown">?</span>';
    }
    var positions = PIP_LAYOUTS[v];
    var html = '';
    for (var i = 0; i < positions.length; i++) {
      var x = positions[i][0];
      var y = positions[i][1];
      html += '<span class="pip" style="left:' + x + '%;top:' + y + '%;transform:translate(-50%,-50%)"></span>';
    }
    return html;
  }

  function applyFace(dieEl, rawValue) {
    var v = parseInt(rawValue, 10);
    dieEl.className = dieEl.className.replace(/\bdie-[1-6]\b/g, '').replace(/\s+/g, ' ').trim();
    if (v >= 1 && v <= 6) { dieEl.classList.add('die-' + v); }
    dieEl._pipRendering = true;
    dieEl.innerHTML = buildPips(rawValue);
    dieEl._pipRendering = false;
  }

  function watchDie(dieEl) {
    if (!dieEl) return;
    applyFace(dieEl, dieEl.textContent.trim());

    var observer = new MutationObserver(function() {
      if (dieEl._pipRendering) return;
      var raw = dieEl.textContent.trim();
      if (raw === '?' || (raw.length <= 2 && /^[1-6]$/.test(raw))) {
        applyFace(dieEl, raw);
      }
    });

    observer.observe(dieEl, { childList: true, characterData: true, subtree: true });
  }

  function init() {
    ['die-0', 'die-1', 'die-2'].forEach(function(id) {
      watchDie(document.getElementById(id));
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

<!-- ═══════════════════════════════════════════════════
     ALLEY SCENE RENDERER
     Canvas-based first-person alley with lanterns, neon, cobblestones, steam
═══════════════════════════════════════════════════ -->
<script>
// Alley scene renderer
const alleyCanvas = document.getElementById('alley-canvas');
const actx = alleyCanvas.getContext('2d');
let alleyParticles = [];

function resizeAlley() {
  const rect = alleyCanvas.parentElement.getBoundingClientRect();
  alleyCanvas.width = rect.width * window.devicePixelRatio;
  alleyCanvas.height = rect.height * window.devicePixelRatio;
  actx.scale(window.devicePixelRatio, window.devicePixelRatio);
}

function drawAlley() {
  const w = alleyCanvas.width / window.devicePixelRatio;
  const h = alleyCanvas.height / window.devicePixelRatio;
  const vx = w * 0.5;   // vanishing point x
  const vy = h * 0.25;  // vanishing point y

  // Sky
  actx.fillStyle = '#040208';
  actx.fillRect(0, 0, w, h);

  // Left wall
  actx.beginPath();
  actx.moveTo(0, h);
  actx.lineTo(0, 0);
  actx.lineTo(vx - 30, vy);
  actx.lineTo(vx - 30, h);
  actx.fillStyle = '#1a1008';
  actx.fill();

  // Right wall
  actx.beginPath();
  actx.moveTo(w, h);
  actx.lineTo(w, 0);
  actx.lineTo(vx + 30, vy);
  actx.lineTo(vx + 30, h);
  actx.fillStyle = '#160e06';
  actx.fill();

  // Ground
  actx.beginPath();
  actx.moveTo(0, h);
  actx.lineTo(vx - 30, vy + 60);
  actx.lineTo(vx + 30, vy + 60);
  actx.lineTo(w, h);
  actx.fillStyle = '#1c1610';
  actx.fill();

  // Cobblestone grid
  for (let row = 0; row < 12; row++) {
    const t = row / 12;
    const y = vy + 60 + (h - vy - 60) * t;
    const halfW = 30 + (w/2 - 30) * t;
    const cx = w/2;
    const stoneW = 20 + 40 * t;
    const stoneH = 4 + 10 * t;
    for (let col = -6; col <= 6; col++) {
      const sx = cx + col * stoneW * 1.1 + (row % 2 ? stoneW * 0.5 : 0);
      if (sx > cx - halfW && sx < cx + halfW) {
        actx.fillStyle = `rgba(${40+Math.random()*20},${32+Math.random()*15},${24+Math.random()*10},0.8)`;
        actx.beginPath();
        actx.roundRect(sx - stoneW/2, y - stoneH/2, stoneW, stoneH, 3);
        actx.fill();
        actx.strokeStyle = 'rgba(0,0,0,0.4)';
        actx.lineWidth = 0.5;
        actx.stroke();
      }
    }
  }

  // Lanterns
  const lanterns = [
    { x: vx - 80, y: vy + 40,  r: 12, color: '#ff6600' },
    { x: vx + 70, y: vy + 30,  r: 10, color: '#ff4400' },
    { x: vx - 40, y: vy + 100, r: 15, color: '#ff5500' },
    { x: vx + 50, y: vy + 120, r: 14, color: '#ee4400' },
  ];
  lanterns.forEach(l => {
    // Glow pool
    const grad = actx.createRadialGradient(l.x, l.y, 0, l.x, l.y, l.r * 8);
    grad.addColorStop(0, l.color + '40');
    grad.addColorStop(1, 'transparent');
    actx.fillStyle = grad;
    actx.fillRect(l.x - l.r*8, l.y - l.r*8, l.r*16, l.r*16);
    // Lantern body
    actx.fillStyle = l.color;
    actx.beginPath();
    actx.ellipse(l.x, l.y, l.r * 0.7, l.r, 0, 0, Math.PI * 2);
    actx.fill();
    // String
    actx.strokeStyle = '#666';
    actx.lineWidth = 1;
    actx.beginPath();
    actx.moveTo(l.x, l.y - l.r);
    actx.lineTo(l.x, l.y - l.r - 20);
    actx.stroke();
  });

  // Neon signs
  actx.save();
  actx.shadowColor = '#00ccff';
  actx.shadowBlur = 20;
  actx.font = 'bold 18px sans-serif';
  actx.fillStyle = '#00eeff';
  actx.fillText('骰子', vx - 120, vy + 20);
  actx.shadowColor = '#ff44aa';
  actx.shadowBlur = 20;
  actx.fillStyle = '#ff66bb';
  actx.fillText('勝負', vx + 80, vy + 50);
  actx.restore();

  // Steam particles
  if (alleyParticles.length < 15) {
    alleyParticles.push({
      x: vx + (Math.random() - 0.5) * 100,
      y: h * 0.7 + Math.random() * h * 0.2,
      r: 10 + Math.random() * 30,
      vy: -0.2 - Math.random() * 0.3,
      alpha: 0.03 + Math.random() * 0.04,
    });
  }
  alleyParticles.forEach(p => {
    actx.fillStyle = `rgba(200,180,150,${p.alpha})`;
    actx.beginPath();
    actx.ellipse(p.x, p.y, p.r, p.r * 0.6, 0, 0, Math.PI * 2);
    actx.fill();
    p.y += p.vy;
    p.x += (Math.random() - 0.5) * 0.3;
    p.alpha -= 0.0003;
  });
  alleyParticles = alleyParticles.filter(p => p.alpha > 0);

  requestAnimationFrame(drawAlley);
}

window.addEventListener('resize', resizeAlley);
// drawAlley() is called by showScreen('game') via the alleyStarted guard
</script>

</body>
</html>
