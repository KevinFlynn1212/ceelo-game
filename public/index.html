  // ===== WINNER =====
  function showWinner(ev) {
    const { winner, winnerName, pot, rakeTaken, isTie, allDancing, carryoverPot, results } = ev;
    const f = n => '金' + (n||0).toLocaleString();

    // Header content
    let crown = '🏆', title = 'Round Winner', nameText = '', resultText = '', potText = '', rakeText = '';
    let isMe = false;

    if (allDancing) {
      crown = '🐉';
      title = 'ALL DANCING DRAGON!';
      nameText = 'Everybody loses!';
      resultText = 'Pot doubles and carries over';
      potText = `New pot: ${f(carryoverPot)}`;
    } else if (isTie) {
      crown = '⚔️';
      title = 'TIE!';
      nameText = 'SHOOTOUT!';
      // Find tying players
      const maxScore = results ? Math.max(...results.map(r => r.score||0)) : 0;
      const tiers = results ? results.filter(r => (r.score||0) === maxScore).map(r => r.name) : [];
      resultText = tiers.length > 0 ? tiers.join(' vs ') + ' — re-roll for the pot' : 'Tying players re-roll';
      potText = `${f(pot)} at stake`;
    } else if (winner) {
      const wp = results && results.find(p => p.id === winner);
      const wpFallback = !wp && roomState && roomState.players && roomState.players.find(p => p.id === winner);
      // Last resort: top scorer from sorted results
      const wpTop = (!wp && !wpFallback && results && results.length > 0)
        ? [...results].sort((a,b) => (b.score||0) - (a.score||0))[0] : null;
      const winPlayer = wp || wpFallback || wpTop;
      isMe = winner === myId || (winPlayer && winPlayer.id === myId)
             || (winnerName && winnerName === myName);
      crown = isMe ? '🏆' : '🎉';
      title = isMe ? '🏆 YOU WIN! 🏆' : 'Round Over';
      nameText = winPlayer ? winPlayer.name : winnerName || (isMe ? (myName || 'You') : 'Winner');
      // Result label from event results
      if (winPlayer && winPlayer.result) {
        const t = winPlayer.result.type || '';
        if      (t==='456')   resultText = '🌟 Strungflowers!';
        else if (t==='trips') resultText = `⚡ Trips ${winPlayer.result.point||''}`;
        else if (t==='point') resultText = `Point ${winPlayer.result.point||''}`;
        else if (t==='123')   resultText = '🐉 Dancing Dragon';
        else                  resultText = winPlayer.result.label || '';
      }
      const won = (pot||0) - (rakeTaken||0);
      potText = `${f(won)} won` + (rakeTaken ? ` · House rake: ${f(rakeTaken)}` : '');
    } else {
      title = 'Round Over';
      nameText = '—';
    }

    document.getElementById('winner-name').innerHTML = `<span style="font-size:2rem;">${crown}</span><br>${escHtml(nameText)}`;
    document.getElementById('winner-result').textContent = resultText;
    document.getElementById('winner-pot').textContent = potText;
    document.getElementById('winner-rake').textContent = winner === myId && !isTie && !allDancing
      ? (rakeTaken ? `(House rake: ${f(rakeTaken)} deducted)` : '') : '';
    document.getElementById('winner-title').textContent = title;

    // Rankings table from event results
    const rankings = document.getElementById('winner-rankings');
    rankings.innerHTML = '';
    if (results && results.length > 0) {
      const sorted = [...results].sort((a, b) => (b.score||0) - (a.score||0));
      sorted.forEach((p, i) => {
        const t = p.result && p.result.type || '';
        let rl = '—';
        if      (t==='456')   rl = '🌟 Strungflowers';
        else if (t==='trips') rl = `⚡ Trips ${p.result.point||''}`;
        else if (t==='point') rl = `point ${p.result.point||''}`;
        else if (t==='123')   rl = '🐉 Dancing Dragon';
        else if (t==='bust')  rl = 'bust';
        else if (t==='none')  rl = 'no combo';
        else if (p.result)    rl = p.result.label||'—';
        const isWin = p.id === winner;
        const row = document.createElement('div');
        row.className = 'rank-row' + (isWin ? ' rank-winner' : '');
        row.innerHTML = `
          <div class="rank-num">${isWin ? '🏆' : '#' + (i+1)}</div>
          <div class="rank-name">${escHtml(p.name)}${p.id === myId ? ' <span style="color:var(--gold);font-size:0.75em;">(you)</span>' : ''}</div>
          <div class="rank-result">${escHtml(rl)}</div>
        `;
        rankings.appendChild(row);
      });
    }

    _blockGameScreen = true;

    // Flash overlay
    const flashEl = document.createElement('div');
    const winnerResultObj = results && winner ? results.find(p=>p.id===winner) : null;
    const winnerType = winnerResultObj && winnerResultObj.result ? winnerResultObj.result.type : '';
    flashEl.className = 'winner-flash-overlay ' + (allDancing ? 'dragon' : winnerType==='456' ? 'strung' : winnerType==='123' ? 'dragon' : '');
    document.body.appendChild(flashEl);
    setTimeout(() => flashEl.remove(), 1500);

    // ── In-alley winner overlay ──────────────────────────────────────────────
    // Get winner's last dice roll
    let winDice = [];
    if (roomState && roomState.players) {
      const wp2 = roomState.players.find(p => p.id === winner);
      if (wp2 && wp2.rolls && wp2.rolls.length > 0) winDice = wp2.rolls[wp2.rolls.length-1];
    }
    const labelTxt = allDancing ? '🐉 ALL DANCING DRAGON 🐉' : isTie ? '⚔️ TIE — SHOOTOUT ⚔️' : isMe ? '🏆 YOU WIN! 🏆' : '🏆 WINNER 🏆';
    const nameTxt  = allDancing ? 'Pot Doubles!' : isTie ? (results ? results.filter(r=>(r.score||0)===Math.max(...results.map(x=>x.score||0))).map(r=>r.name).join(' vs ') : 'Shootout!') : nameText;
    const subTxt   = isTie ? 'Tying players roll again' : allDancing ? 'Pot doubles — carries over' : isMe ? '🎊 Congratulations!' : 'Better luck next round';
    const dicePips = winDice.length > 0 ? winDice.map(d => `<div class="aw-die">${d}</div>`).join('') : '';

    // Remove any existing winner overlay, then inject fresh onto body (guaranteed centering)
    const oldOv = document.getElementById('alley-winner');
    if (oldOv) oldOv.remove();
    const awOverlay = document.createElement('div');
    awOverlay.id = 'alley-winner';
    awOverlay.className = 'alley-winner-overlay'; // full-viewport flex wrapper — always centered
    awOverlay.innerHTML = `
      <div class="alley-winner-card">
        <div class="alley-winner-label">${escHtml(labelTxt)}</div>
        <div class="alley-winner-name">${escHtml(nameTxt)}</div>
        <div class="alley-winner-dice">${dicePips}</div>
        <div class="alley-winner-result">${escHtml(resultText)}</div>
        <div class="alley-winner-pot">${escHtml(potText)}</div>
        <div class="alley-winner-sub">${escHtml(subTxt)}</div>
      </div>`;
    document.body.appendChild(awOverlay);

    // Hide result label behind winner card
    const resLabel = document.getElementById('result-label');
    if (resLabel) resLabel.style.visibility = 'hidden';
    // Stay on game screen so alley + dice stay visible
    showScreen('game');

    // Fly coins if someone won
    if (winner && !isTie && !allDancing) launchCoins(winner === myId ? 30 : 12);

    if (winnerDismissTimer) clearTimeout(winnerDismissTimer);
    winnerDismissTimer = setTimeout(() => dismissWinner(), 10000);
  }

  function launchCoinsFromSeat(slotEl) {
    const rect = slotEl.getBoundingClientRect();
    // Origin: center-top of the seat box
    const ox = rect.width  ? rect.left + rect.width / 2 : window.innerWidth / 2;
    const oy = rect.height ? rect.top  + rect.height / 4 : window.innerHeight * 0.78;
    const symbols = ['🪙','🪙','🪙','💰','✨','⭐','🌟'];
    for (let i = 0; i < 22; i++) {
      const el = document.createElement('div');
      el.className = 'seat-coin';
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      // Fountain spread: mostly upward, slight horizontal fan
      const angle = -Math.PI/2 + (Math.random() - 0.5) * 1.0; // -90° ± 30°
      const dist  = 80 + Math.random() * 140;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      const dur   = 1400 + Math.random() * 600;
      const delay = i * 45;
      el.style.cssText = `left:${ox}px;top:${oy}px;font-size:${1.4 + Math.random()*0.8}rem;`;
      el.style.setProperty('--cx', dx + 'px');
      el.style.setProperty('--cy', dy + 'px');
      el.style.setProperty('--cr', Math.round(Math.random()*480 - 240) + 'deg');
      el.style.setProperty('--dur', dur + 'ms');
      el.style.setProperty('--delay', delay + 'ms');
      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur + delay + 100);
    }
  }

  function launchCoins(count) {
    const symbols = ['🪙','💰','✨','⭐','🌟'];
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.textContent = symbols[Math.floor(Math.random()*symbols.length)];
        const x = 20 + Math.random() * 60; // % across screen
        el.style.cssText = `position:fixed;left:${x}%;bottom:30%;font-size:${1.2+Math.random()*1.5}rem;z-index:200;pointer-events:none;
          animation:coinFloat ${1.2+Math.random()*1.2}s ease-out forwards;`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2600);
      }, i * 60);
    }
  }

  function dismissWinner() {
    if (winnerDismissTimer) { clearTimeout(winnerDismissTimer); winnerDismissTimer = null; }
    _blockGameScreen = false;
    // Animate alley overlay out
    const awOverlay = document.getElementById('alley-winner');
    if (awOverlay) {
      awOverlay.classList.add('hiding');
      setTimeout(() => awOverlay.remove(), 400);
    }
    showScreen('game');
    // Hide dice and clear result label for new round
    clearDice();
    _diceRevealedFor.clear();
    _coinLaunchedFor.clear();
    _animatingForPlayer = null;
    const rl = document.getElementById('result-label');
    if (rl) { rl.style.visibility = ''; rl.textContent = ''; }
    const btn = document.getElementById('btn-roll');
    if (btn && (btn.textContent.includes('Done') || btn.textContent === '✓ Done')) {
      btn.textContent = '🎲 THROW DICE';
      btn.disabled = true;
    }
  }

  document.getElementById('btn-winner-close').addEventListener('click', dismissWinner);

  // ===== ROLL =====
  document.getElementById('btn-roll').addEventListener('click', () => {
    if (animating) return;
    socket.emit('roll_dice');
  });

  // ===== LEAVE =====
  document.getElementById('btn-leave').addEventListener('click', () => {
    socket.emit('leave_room');
    currentRoom = null;
    roomState = null;
    isSpectator = false;
    // Hide dice
    clearDice();
    document.getElementById('result-label').textContent = '';
    hideReAnteOffer();
    clearChat();
    closeChatPanel();
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.getElementById('game-timer').textContent = '—';
    showScreen('lobby');
    socket.emit('get_lobby');
  });

  // ===== ADD BOT =====
  document.getElementById('btn-add-bot').addEventListener('click', () => {
    if (!currentRoom) return;
    fetch('/api/bot/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomId: currentRoom }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.error) showError(data.error);
    })
    .catch(() => showError('Failed to add bot'));
  });

  // ===== CHAT PANEL TOGGLE =====
  function openChatPanel() {
    document.getElementById('chat-panel').classList.add('open');
  }
  function closeChatPanel() {
    document.getElementById('chat-panel').classList.remove('open');
  }

  document.getElementById('btn-chat-toggle').addEventListener('click', openChatPanel);
  document.getElementById('btn-chat-close').addEventListener('click', closeChatPanel);

  // ===== CHAT =====
  function clearChat() {
    document.getElementById('chat-messages').innerHTML = '';
  }

  function addChatMessage(msg) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (msg.type || 'system');

    if (msg.type === 'player') {
      div.innerHTML = `<span class="msg-name">${escHtml(msg.name || '?')}:</span>${escHtml(msg.text || '')}`;
    } else {
      div.textContent = msg.text || '';
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  const chatInput = document.getElementById('chat-input');
  const btnChatSend = document.getElementById('btn-chat-send');

  function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    socket.emit('send_chat', { text });
    chatInput.value = '';
  }

  btnChatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

  // ===== ERROR TOAST =====
  let errorTimer = null;
  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.classList.add('show');
    if (errorTimer) clearTimeout(errorTimer);
    errorTimer = setTimeout(() => { toast.classList.remove('show'); }, 3500);
  }

  // ===== UTILS =====
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ===== AUTO-REFRESH LOBBY =====
  setInterval(() => {
    const lobby = document.getElementById('screen-lobby');
    if (lobby.classList.contains('active')) {
      socket.emit('get_lobby');
    }
  }, 5000);

})();
</script>
