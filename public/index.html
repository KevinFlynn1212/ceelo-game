<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEE-LO</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f5c842;
    --gold-dim: #a8882c;
    --paper: #f0e8d0;
    --red: #cc2200;
    --bg: #050302;
    --card: rgba(20, 14, 4, 0.88);
    --border: rgba(245, 200, 66, 0.35);
    --text: #e8dcc8;
    --muted: #8a7a5a;
    --green: #4caf50;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient glows */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(180,100,0,0.18) 0%, transparent 70%);
    top: -200px; left: -200px;
  }
  body::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(200,140,0,0.12) 0%, transparent 70%);
    bottom: -150px; right: -150px;
  }

  .screen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1;
    padding: 16px;
  }
  .screen.active { display: flex; }

  /* ===== LOGIN ===== */
  #screen-login { flex-direction: column; gap: 24px; }

  .logo {
    font-size: clamp(4rem, 12vw, 7rem);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.15em;
    text-shadow: 0 0 40px rgba(245,200,66,0.6), 0 0 80px rgba(245,200,66,0.2);
    text-align: center;
  }
  .logo-sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: -16px;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 360px;
  }

  input[type="text"], input[type="number"] {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    padding: 12px 16px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--gold);
  }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn {
    background: var(--gold);
    color: #1a1000;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .btn:hover { background: #ffd84a; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    font-size: 0.85rem;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  .btn-red {
    background: var(--red);
    color: #fff;
  }
  .btn-red:hover { background: #e03010; }

  .btn-green {
    background: var(--green);
    color: #fff;
  }
  .btn-green:hover { background: #5dbf61; }

  /* ===== LOBBY ===== */
  #screen-lobby {
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    overflow-y: auto;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .lobby-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .lobby-title {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  .balance-display {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 0.9rem;
  }
  .balance-display span { color: var(--gold); font-weight: 700; font-size: 1.1rem; }

  .rooms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .room-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .room-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(245,200,66,0.15);
  }

  .room-card-name {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--gold);
  }
  .room-card-ante {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .room-card-info {
    font-size: 0.9rem;
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
  }
  .room-card-players { color: var(--paper); }
  .room-card-pot { color: var(--gold); font-weight: 600; }
  .room-card-state {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    align-self: flex-start;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .room-card-state.waiting { color: var(--green); }
  .room-card-state.active { color: var(--gold); }

  /* ===== GAME ===== */
  #screen-game {
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    padding: 0;
    gap: 0;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(5,3,2,0.9);
    flex-shrink: 0;
    flex-wrap: wrap;
    gap: 8px;
  }

  .game-room-name {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--gold);
  }

  .game-stats {
    display: flex;
    gap: 20px;
    font-size: 0.85rem;
    flex-wrap: wrap;
  }
  .game-stat { color: var(--muted); }
  .game-stat span { color: var(--paper); font-weight: 600; }
  .game-stat .val-gold { color: var(--gold); }

  .game-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* Left: main play area */
  .game-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
    padding: 16px;
  }

  /* Dice area */
  .dice-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px 0;
  }

  .dice-container {
    display: flex;
    gap: 16px;
    align-items: center;
    justify-content: center;
  }

  .die {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, #2a2010, #1a1408);
    border: 2px solid var(--border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    font-weight: 900;
    color: var(--paper);
    position: relative;
    transition: transform 0.1s;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.4);
  }
  .die.rolling {
    animation: shake 0.1s infinite;
    border-color: var(--gold);
    color: var(--gold);
  }
  .die.landed {
    animation: bounce 0.4s ease-out;
    border-color: var(--gold);
  }
  @keyframes shake {
    0%, 100% { transform: translate(0,0) rotate(0deg); }
    25% { transform: translate(-2px, 1px) rotate(-3deg); }
    75% { transform: translate(2px, -1px) rotate(3deg); }
  }
  @keyframes bounce {
    0% { transform: scale(0.85); }
    50% { transform: scale(1.15); }
    75% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  /* pip-based dice */
  .die-pips {
    width: 72px;
    height: 72px;
    background: linear-gradient(145deg, #2a2010, #1a1408);
    border: 2px solid var(--border);
    border-radius: 14px;
    display: grid;
    padding: 8px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.4);
    position: relative;
  }
  .die-pips.rolling {
    animation: shake 0.1s infinite;
    border-color: var(--gold);
  }
  .die-pips.landed {
    animation: bounce 0.4s ease-out;
    border-color: var(--gold);
  }
  .pip {
    width: 10px;
    height: 10px;
    background: var(--paper);
    border-radius: 50%;
    position: absolute;
  }

  .result-label {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--gold);
    text-align: center;
    min-height: 2rem;
    letter-spacing: 0.05em;
    text-shadow: 0 0 20px rgba(245,200,66,0.5);
  }

  .action-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }

  #btn-roll {
    font-size: 1.1rem;
    padding: 14px 40px;
    border-radius: 10px;
    min-width: 160px;
  }

  .reante-buttons {
    display: none;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .reante-buttons.visible { display: flex; }

  .reante-label {
    color: var(--gold);
    font-weight: 700;
    font-size: 0.9rem;
    text-align: center;
    width: 100%;
  }

  .timer {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--paper);
    font-variant-numeric: tabular-nums;
    min-width: 3ch;
    text-align: center;
  }
  .timer.urgent { color: var(--red); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Players list */
  .players-section {
    border-top: 1px solid var(--border);
    padding-top: 16px;
    margin-top: 8px;
  }
  .players-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    transition: all 0.2s;
    flex-wrap: wrap;
  }
  .player-row.active-turn {
    border-color: var(--gold);
    background: rgba(245,200,66,0.07);
  }
  .player-row.is-me {
    border-color: rgba(245,200,66,0.25);
  }
  .player-row.done { opacity: 0.7; }

  .player-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold-dim), #3a2800);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--gold);
    flex-shrink: 0;
  }
  .player-name {
    font-weight: 600;
    font-size: 0.9rem;
    flex: 1;
    min-width: 80px;
  }
  .player-name .you-tag {
    font-size: 0.7rem;
    color: var(--gold);
    background: rgba(245,200,66,0.15);
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 6px;
  }
  .player-balance {
    font-size: 0.85rem;
    color: var(--muted);
    min-width: 60px;
    text-align: right;
  }
  .player-result {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--paper);
    min-width: 80px;
    text-align: center;
  }
  .player-status {
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    flex-shrink: 0;
  }
  .player-status.done { background: rgba(76,175,80,0.15); color: var(--green); }
  .player-status.rolling { background: rgba(245,200,66,0.15); color: var(--gold); }

  /* Right: Chat */
  .game-chat {
    width: 280px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: rgba(5,3,2,0.7);
  }

  .chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .chat-msg {
    font-size: 0.8rem;
    line-height: 1.4;
    padding: 6px 10px;
    border-radius: 8px;
    word-break: break-word;
  }
  .chat-msg.system {
    color: var(--muted);
    font-style: italic;
    background: rgba(255,255,255,0.03);
    font-size: 0.75rem;
  }
  .chat-msg.player {
    background: rgba(255,255,255,0.05);
    border-left: 2px solid var(--border);
  }
  .chat-msg .msg-name {
    color: var(--gold);
    font-weight: 700;
    margin-right: 4px;
  }

  .chat-input-area {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }
  .chat-input-area input {
    flex: 1;
    padding: 8px 12px;
    font-size: 0.85rem;
  }
  .chat-input-area .btn {
    padding: 8px 14px;
    font-size: 0.8rem;
  }

  /* ===== WINNER OVERLAY ===== */
  #screen-winner {
    background: rgba(5,3,2,0.92);
    flex-direction: column;
    gap: 24px;
    z-index: 100;
  }

  .winner-card {
    background: var(--card);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 32px 40px;
    max-width: 480px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    box-shadow: 0 0 60px rgba(245,200,66,0.2);
  }

  .winner-crown { font-size: 3rem; }
  .winner-title { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.2em; }
  .winner-name { font-size: 2rem; font-weight: 900; color: var(--gold); text-align: center; }
  .winner-result { font-size: 1.1rem; color: var(--paper); }
  .winner-pot {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--gold);
  }
  .winner-rake { font-size: 0.8rem; color: var(--muted); }

  .winner-rankings {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .rank-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    font-size: 0.85rem;
  }
  .rank-num { color: var(--muted); width: 20px; font-weight: 700; }
  .rank-name { flex: 1; }
  .rank-result { color: var(--gold); font-weight: 600; }

  /* Error toast */
  #error-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--red);
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    z-index: 200;
    transition: transform 0.3s;
    pointer-events: none;
  }
  #error-toast.show { transform: translateX(-50%) translateY(0); }

  /* Round history */
  .round-history {
    margin-top: 8px;
    padding: 10px;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .round-history-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  /* Spectator banner */
  .spectator-banner {
    display: none;
    background: rgba(245,200,66,0.1);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    text-align: center;
    font-size: 0.85rem;
    color: var(--gold);
    margin: 8px 0;
  }
  .spectator-banner.visible { display: block; }

  /* Responsive */
  @media (max-width: 768px) {
    .game-chat { display: none; }
    .game-body { flex-direction: column; }
    .die, .die-pips { width: 60px; height: 60px; }
    .die { font-size: 1.6rem; }
    .game-header { padding: 8px 12px; }
    .lobby-header { padding: 12px 0 10px; }
    .rooms-grid { grid-template-columns: 1fr 1fr; }
    .winner-card { padding: 24px 20px; }
    #screen-lobby { padding: 0 12px; }
    #screen-game { padding: 0; }
  }

  @media (max-width: 480px) {
    .rooms-grid { grid-template-columns: 1fr; }
    .logo { font-size: 3.5rem; }
  }
</style>
</head>
<body>

<!-- ERROR TOAST -->
<div id="error-toast"></div>

<!-- ===== SCREEN 1: LOGIN ===== -->
<div id="screen-login" class="screen active">
  <div class="logo">CEE-LO</div>
  <div class="logo-sub">The Dice Game</div>
  <div class="login-card">
    <input type="text" id="input-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
    <button class="btn" id="btn-enter-lobby">Enter Lobby</button>
  </div>
</div>

<!-- ===== SCREEN 2: LOBBY ===== -->
<div id="screen-lobby" class="screen">
  <div class="lobby-header">
    <div class="lobby-title">🎲 CEE-LO</div>
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
      <div class="balance-display">Balance: $<span id="lobby-balance">—</span></div>
      <div id="lobby-player-name" style="color:var(--muted);font-size:0.85rem;"></div>
    </div>
  </div>
  <div class="rooms-grid" id="rooms-grid"></div>
</div>

<!-- ===== SCREEN 3: GAME ===== -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="game-room-name" id="game-room-name">—</div>
      <button class="btn-outline" id="btn-leave">Leave</button>
    </div>
    <div class="game-stats">
      <div class="game-stat">Round <span id="game-round">—</span></div>
      <div class="game-stat">Ante <span id="game-ante">—</span></div>
      <div class="game-stat">Pot <span class="val-gold" id="game-pot">$0</span></div>
      <div class="game-stat">Timer <span id="game-timer" class="timer">—</span></div>
    </div>
  </div>
  <div class="game-body">
    <!-- Main play area -->
    <div class="game-main">
      <div class="spectator-banner" id="spectator-banner">👁 Spectating — you are not in this round</div>

      <div class="dice-section">
        <div class="dice-container" id="dice-container">
          <div class="die" id="die-0">?</div>
          <div class="die" id="die-1">?</div>
          <div class="die" id="die-2">?</div>
        </div>
        <div class="result-label" id="result-label"></div>
      </div>

      <div class="action-area">
        <button class="btn" id="btn-roll" disabled>Roll Dice</button>
        <div class="reante-buttons" id="reante-buttons">
          <div class="reante-label" id="reante-label">Re-Ante offered!</div>
          <button class="btn btn-green" id="btn-reante-yes">✓ Yes, Re-Ante</button>
          <button class="btn btn-red" id="btn-reante-no">✗ No Thanks</button>
        </div>
      </div>

      <div class="players-section">
        <div class="players-title">Players</div>
        <div id="players-list"></div>
      </div>

      <div class="round-history" id="round-history" style="display:none;">
        <div class="round-history-title">Recent Rounds</div>
        <div id="round-history-content"></div>
      </div>
    </div>

    <!-- Chat panel -->
    <div class="game-chat">
      <div class="chat-header">Chat</div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-area">
        <input type="text" id="chat-input" placeholder="Say something..." maxlength="200">
        <button class="btn" id="btn-chat-send">→</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== SCREEN 4: WINNER OVERLAY ===== -->
<div id="screen-winner" class="screen">
  <div class="winner-card">
    <div class="winner-crown">🏆</div>
    <div class="winner-title">Round Winner</div>
    <div class="winner-name" id="winner-name">—</div>
    <div class="winner-result" id="winner-result"></div>
    <div class="winner-pot" id="winner-pot"></div>
    <div class="winner-rake" id="winner-rake"></div>
    <div class="winner-rankings" id="winner-rankings"></div>
    <button class="btn" id="btn-winner-close" style="margin-top:8px;">Continue →</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  'use strict';

  // ===== STATE =====
  let myId = null;
  let myName = '';
  let myBalance = 1000;
  let currentRoom = null;
  let roomState = null;
  let isSpectator = false;
  let timerInterval = null;
  let animating = false;
  let winnerDismissTimer = null;

  // ===== SOCKET =====
  const socket = io();

  socket.on('connect', () => {
    myId = socket.id;
    console.log('Connected:', myId);
  });

  socket.on('disconnect', () => {
    showError('Disconnected from server');
  });

  socket.on('error', ({ message }) => {
    showError(message);
  });

  socket.on('lobby_state', (data) => {
    renderLobby(data.rooms);
  });

  socket.on('room_state', (state) => {
    roomState = state;
    currentRoom = state;
    renderGameState(state);
    showScreen('game');
  });

  socket.on('roll_result', ({ playerId, dice, evaluation, rollCount, done }) => {
    if (playerId === myId) {
      animateDice(dice, evaluation);
    } else {
      // Update that player's display briefly
      updatePlayerResult(playerId, dice, evaluation, done);
    }
  });

  socket.on('re_ante_offer', ({ playerId, timerEnd }) => {
    if (playerId === myId) {
      showReAnteOffer();
      startTimer(timerEnd);
    }
  });

  socket.on('shootout_start', ({ playerIds, round, timerEnd }) => {
    addChatMessage({ type: 'system', text: `🔫 Shootout Round ${round}! Players: ${playerIds.length}` });
    startTimer(timerEnd);
  });

  socket.on('round_end', ({ winner, pot, rake, isTie }) => {
    showWinner(winner, pot, rake, isTie);
  });

  socket.on('chat_message', (msg) => {
    addChatMessage(msg);
  });

  // ===== SCREENS =====
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active');
      s.style.display = 'none';
    });
    const el = document.getElementById('screen-' + name);
    if (el) {
      el.style.display = 'flex';
      el.classList.add('active');
    }
  }

  // Initially set all screens to none except login
  document.querySelectorAll('.screen').forEach(s => {
    if (!s.classList.contains('active')) s.style.display = 'none';
  });

  // ===== LOGIN =====
  const btnEnterLobby = document.getElementById('btn-enter-lobby');
  const inputName = document.getElementById('input-name');

  btnEnterLobby.addEventListener('click', enterLobby);
  inputName.addEventListener('keydown', (e) => { if (e.key === 'Enter') enterLobby(); });

  function enterLobby() {
    const name = inputName.value.trim();
    if (!name) { showError('Please enter your name'); return; }
    myName = name;
    document.getElementById('lobby-player-name').textContent = name;
    showScreen('lobby');
    socket.emit('get_lobby');
  }

  // ===== LOBBY =====
  function renderLobby(rooms) {
    const grid = document.getElementById('rooms-grid');
    grid.innerHTML = '';
    if (!rooms || !rooms.length) {
      grid.innerHTML = '<div style="color:var(--muted);padding:20px;">No rooms available</div>';
      return;
    }
    rooms.forEach(room => {
      const card = document.createElement('div');
      card.className = 'room-card';
      const stateClass = room.state === 'waiting' ? 'waiting' : 'active';
      const stateLabel = room.state === 'waiting' ? 'Waiting' : 'In Progress';
      card.innerHTML = `
        <div class="room-card-name">${escHtml(room.name)}</div>
        <div class="room-card-ante">Ante: $${room.ante}</div>
        <div class="room-card-info">
          <span class="room-card-players">👥 ${room.playerCount}/${room.maxPlayers}</span>
          <span class="room-card-pot">$${room.pot || 0}</span>
        </div>
        <span class="room-card-state ${stateClass}">${stateLabel}</span>
        ${room.spectatorCount > 0 ? `<div style="font-size:0.75rem;color:var(--muted);">👁 ${room.spectatorCount} watching</div>` : ''}
      `;
      card.addEventListener('click', () => joinRoom(room.id));
      grid.appendChild(card);
    });
  }

  function joinRoom(roomId) {
    isSpectator = false;
    socket.emit('join_room', { name: myName, roomId });
    clearChat();
  }

  // ===== GAME =====
  function renderGameState(state) {
    // Header
    document.getElementById('game-room-name').textContent = state.name || 'Room';
    document.getElementById('game-round').textContent = state.round || 1;
    document.getElementById('game-ante').textContent = '$' + (state.ante || 0);
    document.getElementById('game-pot').textContent = '$' + (state.pot || 0);

    // Determine if we're a player
    const me = state.players ? state.players.find(p => p.id === myId) : null;
    isSpectator = !me;

    document.getElementById('spectator-banner').classList.toggle('visible', isSpectator);

    // Update my balance in lobby header too
    if (me) {
      myBalance = me.balance;
      document.getElementById('lobby-balance').textContent = me.balance;
    }

    // Dice — show my current roll if any
    if (me && me.rolls && me.rolls.length === 3 && !animating) {
      displayDice(me.rolls);
      if (me.result) {
        document.getElementById('result-label').textContent = (me.result.emoji || '') + ' ' + (me.result.label || '');
      }
    }

    // Roll button state
    updateRollButton(state, me);

    // Players list
    renderPlayers(state);

    // Timer
    if (state.timerEnd && state.timerEnd > Date.now()) {
      startTimer(state.timerEnd);
    }

    // Round history
    if (state.roundHistory && state.roundHistory.length > 0) {
      const hist = document.getElementById('round-history');
      const content = document.getElementById('round-history-content');
      hist.style.display = 'block';
      content.textContent = state.roundHistory.slice(-3).map(r =>
        `Round ${r.round}: ${r.winner || 'Tie'} won $${r.pot || 0}`
      ).join(' · ');
    }
  }

  function updateRollButton(state, me) {
    const btn = document.getElementById('btn-roll');
    if (!me || isSpectator) {
      btn.disabled = true;
      btn.textContent = isSpectator ? 'Spectating' : 'Waiting...';
      return;
    }

    const isMyTurn = state.players && state.currentTurnIndex !== undefined
      && state.players[state.currentTurnIndex]
      && state.players[state.currentTurnIndex].id === myId;

    if (me.done) {
      btn.disabled = true;
      btn.textContent = 'Done ✓';
    } else if (me.reAnteActive) {
      btn.disabled = true;
      btn.textContent = 'Re-Ante Pending';
    } else if (!isMyTurn) {
      btn.disabled = true;
      btn.textContent = 'Wait...';
    } else if (animating) {
      btn.disabled = true;
      btn.textContent = 'Rolling...';
    } else {
      btn.disabled = false;
      btn.textContent = me.rollCount > 0 ? 'Roll Again' : 'Roll Dice';
    }
  }

  function renderPlayers(state) {
    const list = document.getElementById('players-list');
    list.innerHTML = '';
    if (!state.players) return;

    state.players.forEach((player, idx) => {
      const row = document.createElement('div');
      row.className = 'player-row';
      if (player.id === myId) row.classList.add('is-me');
      if (state.currentTurnIndex === idx && !player.done) row.classList.add('active-turn');
      if (player.done) row.classList.add('done');

      const initial = (player.name || '?')[0].toUpperCase();
      const resultText = player.result
        ? (player.result.emoji || '') + ' ' + (player.result.label || '')
        : (player.rollCount > 0 ? '...' : '—');
      const statusText = player.done ? 'done' : (state.currentTurnIndex === idx ? 'rolling' : 'waiting');
      const statusClass = player.done ? 'done' : (state.currentTurnIndex === idx ? 'rolling' : '');
      const youTag = player.id === myId ? '<span class="you-tag">YOU</span>' : '';

      row.innerHTML = `
        <div class="player-avatar">${initial}</div>
        <div class="player-name">${escHtml(player.name)}${youTag}</div>
        <div class="player-result">${resultText}</div>
        <div class="player-balance">$${player.balance || 0}</div>
        <div class="player-status ${statusClass}">${statusText}</div>
      `;
      list.appendChild(row);
    });
  }

  function updatePlayerResult(playerId, dice, evaluation, done) {
    // Will be updated via next room_state, but we can mark as rolling
    // Room state will come shortly; no action needed here unless we want immediate feedback
  }

  // ===== DICE =====
  const DICE_FACES = ['', '⚀','⚁','⚂','⚃','⚄','⚅'];

  function displayDice(values) {
    for (let i = 0; i < 3; i++) {
      const die = document.getElementById('die-' + i);
      if (die && values[i] !== undefined) {
        die.textContent = values[i] || '?';
      }
    }
  }

  function animateDice(finalValues, evaluation) {
    animating = true;
    const dies = [0,1,2].map(i => document.getElementById('die-' + i));
    dies.forEach(d => { d.classList.add('rolling'); d.classList.remove('landed'); });

    const duration = 700;
    const start = Date.now();

    const interval = setInterval(() => {
      dies.forEach(d => { d.textContent = Math.ceil(Math.random() * 6); });
    }, 60);

    setTimeout(() => {
      clearInterval(interval);
      dies.forEach((d, i) => {
        d.textContent = finalValues[i];
        d.classList.remove('rolling');
        d.classList.add('landed');
      });
      if (evaluation) {
        document.getElementById('result-label').textContent =
          (evaluation.emoji || '') + ' ' + (evaluation.label || '');
      }
      animating = false;

      // Re-enable roll button based on current state
      setTimeout(() => {
        if (roomState) {
          const me = roomState.players ? roomState.players.find(p => p.id === myId) : null;
          updateRollButton(roomState, me);
        }
      }, 200);
    }, duration);
  }

  // ===== TIMER =====
  function startTimer(timerEnd) {
    if (timerInterval) clearInterval(timerInterval);
    const el = document.getElementById('game-timer');

    function tick() {
      const remaining = Math.max(0, Math.ceil((timerEnd - Date.now()) / 1000));
      el.textContent = remaining + 's';
      el.classList.toggle('urgent', remaining <= 5);
      if (remaining <= 0) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }
    tick();
    timerInterval = setInterval(tick, 500);
  }

  // ===== RE-ANTE =====
  function showReAnteOffer() {
    const btns = document.getElementById('reante-buttons');
    btns.classList.add('visible');
  }

  function hideReAnteOffer() {
    const btns = document.getElementById('reante-buttons');
    btns.classList.remove('visible');
  }

  document.getElementById('btn-reante-yes').addEventListener('click', () => {
    socket.emit('re_ante_accept');
    hideReAnteOffer();
  });

  document.getElementById('btn-reante-no').addEventListener('click', () => {
    socket.emit('re_ante_decline');
    hideReAnteOffer();
  });

  // ===== WINNER =====
  function showWinner(winnerId, pot, rake, isTie) {
    if (!roomState) return;

    const winnerPlayer = roomState.players
      ? roomState.players.find(p => p.id === winnerId)
      : null;

    const winnerName = isTie ? 'TIE!' : (winnerPlayer ? winnerPlayer.name : 'Unknown');
    const winnerResult = winnerPlayer && winnerPlayer.result
      ? (winnerPlayer.result.emoji || '') + ' ' + (winnerPlayer.result.label || '')
      : '';

    document.getElementById('winner-name').textContent = winnerName;
    document.getElementById('winner-result').textContent = winnerResult;
    document.getElementById('winner-pot').textContent = isTie ? 'Pot Carries Over' : ('Won $' + pot);
    document.getElementById('winner-rake').textContent = rake ? `House rake: $${rake}` : '';

    // Rankings
    const rankings = document.getElementById('winner-rankings');
    rankings.innerHTML = '';
    if (roomState.players) {
      const sorted = [...roomState.players]
        .filter(p => p.result)
        .sort((a, b) => (b.result.score || 0) - (a.result.score || 0));

      sorted.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'rank-row';
        row.innerHTML = `
          <div class="rank-num">#${i+1}</div>
          <div class="rank-name">${escHtml(p.name)}${p.id === myId ? ' (you)' : ''}</div>
          <div class="rank-result">${p.result ? (p.result.emoji || '') + ' ' + (p.result.label || '') : '—'}</div>
        `;
        rankings.appendChild(row);
      });
    }

    showScreen('winner');

    // Auto-dismiss after 6s
    if (winnerDismissTimer) clearTimeout(winnerDismissTimer);
    winnerDismissTimer = setTimeout(() => {
      dismissWinner();
    }, 6000);
  }

  function dismissWinner() {
    if (winnerDismissTimer) { clearTimeout(winnerDismissTimer); winnerDismissTimer = null; }
    showScreen('game');
    // Reset dice display
    [0,1,2].forEach(i => {
      const d = document.getElementById('die-' + i);
      d.textContent = '?';
      d.classList.remove('rolling','landed');
    });
    document.getElementById('result-label').textContent = '';
    if (document.getElementById('btn-roll').textContent === 'Done ✓') {
      document.getElementById('btn-roll').textContent = 'Roll Dice';
      document.getElementById('btn-roll').disabled = true;
    }
  }

  document.getElementById('btn-winner-close').addEventListener('click', dismissWinner);

  // ===== ROLL =====
  document.getElementById('btn-roll').addEventListener('click', () => {
    if (animating) return;
    socket.emit('roll_dice');
  });

  // ===== LEAVE =====
  document.getElementById('btn-leave').addEventListener('click', () => {
    socket.emit('leave_room');
    currentRoom = null;
    roomState = null;
    isSpectator = false;
    [0,1,2].forEach(i => {
      const d = document.getElementById('die-'+i);
      d.textContent = '?'; d.classList.remove('rolling','landed');
    });
    document.getElementById('result-label').textContent = '';
    hideReAnteOffer();
    clearChat();
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    document.getElementById('game-timer').textContent = '—';
    showScreen('lobby');
    socket.emit('get_lobby');
  });

  // ===== CHAT =====
  function clearChat() {
    document.getElementById('chat-messages').innerHTML = '';
  }

  function addChatMessage(msg) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + (msg.type || 'system');

    if (msg.type === 'player') {
      div.innerHTML = `<span class="msg-name">${escHtml(msg.name || '?')}:</span>${escHtml(msg.text || '')}`;
    } else {
      div.textContent = msg.text || '';
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  const chatInput = document.getElementById('chat-input');
  const btnChatSend = document.getElementById('btn-chat-send');

  function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;
    socket.emit('send_chat', { text });
    chatInput.value = '';
  }

  btnChatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChat(); });

  // ===== ERROR TOAST =====
  let errorTimer = null;
  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = msg;
    toast.classList.add('show');
    if (errorTimer) clearTimeout(errorTimer);
    errorTimer = setTimeout(() => { toast.classList.remove('show'); }, 3500);
  }

  // ===== UTILS =====
  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ===== AUTO-REFRESH LOBBY =====
  setInterval(() => {
    const lobby = document.getElementById('screen-lobby');
    if (lobby.classList.contains('active')) {
      socket.emit('get_lobby');
    }
  }, 5000);

})();
</script>
</body>
</html>
