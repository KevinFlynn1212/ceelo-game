services:
  ceelo:
    image: node:22-slim
    container_name: dice-game
    working_dir: /app
    volumes:
      - /docker/dice-game:/app
    ports:
      - "127.0.0.1:4000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      AUTH_PORT: 4001
    command: sh -c "node auth-server.js & node server.js"
    restart: unless-stopped
