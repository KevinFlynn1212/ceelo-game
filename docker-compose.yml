services:
  ceelo:
    image: node:22-slim
    container_name: dice-game
    working_dir: /app
    ports:
      - "4000:3000"
    environment:
      PORT: 3000
      AUTH_PORT: 4001
    command: sh -c "apt-get update -qq && apt-get install -y -qq git python3 make g++ && rm -rf /app/game && git clone https://github.com/KevinFlynn1212/ceelo-game.git /app/game && cd /app/game && npm install && node auth-server.js & node /app/game/server.js"
    restart: unless-stopped
